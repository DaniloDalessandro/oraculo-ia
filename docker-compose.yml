services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oraculo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oraculo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass oraculo_redis_2024 --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "oraculo_redis_2024", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/oraculo
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/oraculo
      REDIS_URL: redis://:oraculo_redis_2024@redis:6379/0
      CELERY_BROKER_URL: redis://:oraculo_redis_2024@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:oraculo_redis_2024@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      LOGIN_TOKEN_EXPIRE_MINUTES: ${LOGIN_TOKEN_EXPIRE_MINUTES:-10}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v18.0}
      WHATSAPP_WABA_ID: ${WHATSAPP_WABA_ID}
      WHATSAPP_APP_ID: ${WHATSAPP_APP_ID}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1500}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      AI_CONTEXT_SIZE: ${AI_CONTEXT_SIZE:-5}
      AI_SQL_ROW_LIMIT: ${AI_SQL_ROW_LIMIT:-50}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_CACHE_TTL_SECONDS: ${AI_CACHE_TTL_SECONDS:-600}
      AI_CACHE_ENABLED: ${AI_CACHE_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-5}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-3}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@oraculoia.com}
      PASSWORD_RESET_EXPIRE_MINUTES: ${PASSWORD_RESET_EXPIRE_MINUTES:-30}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
      LOGIN_LOCKOUT_SECONDS: ${LOGIN_LOCKOUT_SECONDS:-900}
      WHATSAPP_SESSION_EXPIRE_HOURS: ${WHATSAPP_SESSION_EXPIRE_HOURS:-24}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-55}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info -Q fila_ia,fila_mensagens --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/oraculo
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/oraculo
      REDIS_URL: redis://:oraculo_redis_2024@redis:6379/0
      CELERY_BROKER_URL: redis://:oraculo_redis_2024@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:oraculo_redis_2024@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v18.0}
      WHATSAPP_APP_ID: ${WHATSAPP_APP_ID}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1500}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
      AI_CONTEXT_SIZE: ${AI_CONTEXT_SIZE:-5}
      AI_SQL_ROW_LIMIT: ${AI_SQL_ROW_LIMIT:-50}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_CACHE_TTL_SECONDS: ${AI_CACHE_TTL_SECONDS:-600}
      AI_CACHE_ENABLED: ${AI_CACHE_ENABLED:-true}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-55}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://:oraculo_redis_2024@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:oraculo_redis_2024@redis:6379/2
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend


volumes:
  postgres_data:
  redis_data:
