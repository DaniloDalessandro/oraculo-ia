services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oraculo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oraculo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass oraculo_redis_2024 --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "oraculo_redis_2024", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/oraculo
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/oraculo
      REDIS_URL: redis://:oraculo_redis_2024@redis:6379/0
      CELERY_BROKER_URL: redis://:oraculo_redis_2024@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:oraculo_redis_2024@redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info -Q fila_ia,fila_mensagens --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/oraculo
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/oraculo
      REDIS_URL: redis://:oraculo_redis_2024@redis:6379/0
      CELERY_BROKER_URL: redis://:oraculo_redis_2024@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:oraculo_redis_2024@redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:oraculo_redis_2024@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:oraculo_redis_2024@redis:6379/2
    depends_on:
      - redis


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  tunnel:
    build:
      context: ./tunnel
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION}
      WHATSAPP_WABA_ID: ${WHATSAPP_WABA_ID}
      WHATSAPP_APP_ID: ${WHATSAPP_APP_ID}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
