name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 1. Build, push e torna as imagens públicas
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push — backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/oraculo-ia-backend:latest
            ghcr.io/${{ github.repository_owner }}/oraculo-ia-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/oraculo-ia-frontend:latest
            ghcr.io/${{ github.repository_owner }}/oraculo-ia-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — tunnel
        uses: docker/build-push-action@v5
        with:
          context: ./tunnel
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/oraculo-ia-tunnel:latest
            ghcr.io/${{ github.repository_owner }}/oraculo-ia-tunnel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Torna os pacotes GHCR públicos (VPS puxa sem autenticação)
      - name: Make GHCR packages public
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for pkg in oraculo-ia-backend oraculo-ia-frontend oraculo-ia-tunnel; do
            echo "Setting $pkg to public..."
            curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/$pkg" \
              -d '{"visibility":"public"}' || true
          done
          echo "Packages set to public."

  # ─────────────────────────────────────────────
  # 2. SSH no VPS → atualiza imagens → reinicia
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: IMAGE_OWNER
          script: |
            set -e

            export OWNER=$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')

            # Localizar docker-compose.yml do projeto oraculo no Dokploy
            COMPOSE_FILE=$(find /etc/dokploy/compose -name "docker-compose.yml" 2>/dev/null \
              | xargs grep -l -i "oraculo" 2>/dev/null | head -1 || true)

            if [ -z "$COMPOSE_FILE" ]; then
              echo "ERRO: compose do projeto oraculo nao encontrado"
              exit 1
            fi

            COMPOSE_DIR=$(dirname "$COMPOSE_FILE")
            echo "Compose: $COMPOSE_FILE"
            cd "$COMPOSE_DIR"

            # Atualizar referencias de imagem para GHCR
            python3 << PYEOF
import re, os, sys

owner = os.environ['OWNER']
path = 'docker-compose.yml'

with open(path) as f:
    content = f.read()

original = content

content = re.sub(
    r'(image:\s*)\S*(?:oraculo[_-]ia[_-]backend|backend[-_]v\d+)\S*',
    rf'\1ghcr.io/{owner}/oraculo-ia-backend:latest',
    content
)
content = re.sub(
    r'(image:\s*)\S*(?:oraculo[_-]ia[_-]frontend|frontend[-_]v\d+)\S*',
    rf'\1ghcr.io/{owner}/oraculo-ia-frontend:latest',
    content
)
content = re.sub(
    r'(image:\s*)\S*(?:oraculo[_-]ia[_-]tunnel|tunnel[-_]v\d+)\S*',
    rf'\1ghcr.io/{owner}/oraculo-ia-tunnel:latest',
    content
)

if content == original:
    print("AVISO: nenhuma imagem atualizada. Linhas 'image:' atuais:")
    for l in content.splitlines():
        if 'image:' in l:
            print(' ', l.strip())
    sys.exit(1)

with open(path, 'w') as f:
    f.write(content)

changed = [l.strip() for l in content.splitlines() if 'ghcr.io' in l]
print(f"Imagens atualizadas ({len(changed)} refs):")
for l in changed:
    print(' ', l)
PYEOF

            # Pull e restart (imagens publicas, sem docker login)
            docker compose pull backend celery-worker flower frontend tunnel
            docker compose up -d --no-deps --remove-orphans \
              backend celery-worker flower frontend tunnel

            echo ""
            echo "Deploy concluido!"
            docker ps --filter "name=oraculo" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
