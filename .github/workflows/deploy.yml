name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Converte owner para lowercase (Docker exige tags em minúsculo)
      - name: Lowercase owner
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/oraculo-ia-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/oraculo-ia-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/oraculo-ia-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/oraculo-ia-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR packages public
        run: |
          OWNER="${{ steps.meta.outputs.owner }}"
          for PKG in oraculo-ia-backend oraculo-ia-frontend; do
            echo -n "Setting $PKG public: "
            curl -s -o /dev/null -w "%{http_code}\n" \
              -X PATCH \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/packages/container/$PKG" \
              -d '{"visibility":"public"}' || true
          done

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: IMAGE_OWNER
          script: |
            set -e
            OWNER=$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')

            # Encontrar compose e extrair project ID do Dokploy
            COMPOSE_FILE=$(find /etc/dokploy/compose -name "docker-compose.yml" 2>/dev/null \
              | xargs grep -l -i "oraculo" 2>/dev/null | head -1 || true)

            if [ -z "$COMPOSE_FILE" ]; then
              echo "ERRO: compose oraculo nao encontrado"
              exit 1
            fi

            COMPOSE_DIR=$(dirname "$COMPOSE_FILE")
            # Project ID é o diretório pai do subdiretório code/
            PROJECT_ID=$(basename "$(dirname "$COMPOSE_DIR")")
            echo "Compose: $COMPOSE_FILE"
            echo "Project ID: $PROJECT_ID"
            cd "$COMPOSE_DIR"

            # Atualizar imagens para GHCR
            sed -i "s|image:.*oraculo-ia-backend.*|image: ghcr.io/$OWNER/oraculo-ia-backend:latest|g" docker-compose.yml
            sed -i "s|image:.*oraculo-ia-frontend.*|image: ghcr.io/$OWNER/oraculo-ia-frontend:latest|g" docker-compose.yml
            sed -i "s|image:.*oraculo-ia-tunnel.*|image: ghcr.io/$OWNER/oraculo-ia-tunnel:latest|g" docker-compose.yml

            echo "=== Imagens atualizadas ==="
            grep "image:" docker-compose.yml | grep -v "postgres\|redis"

            # Pull e restart usando o project ID correto do Dokploy
            docker compose -p "$PROJECT_ID" pull backend celery-worker flower frontend
            docker compose -p "$PROJECT_ID" up -d --no-deps --remove-orphans \
              backend celery-worker flower frontend

            echo "=== Deploy concluido ==="
            sleep 5
            docker ps --filter "label=com.docker.compose.project=$PROJECT_ID" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep -v "postgres\|redis"
